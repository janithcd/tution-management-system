<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Attendance Records')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <h2 class="page-title">Attendance Records</h2>
            <p class="page-subtitle">Search and filter student attendance records</p>
        </div>

        <a href="/attendance" class="btn btn-primary">Mark Attendance</a>
    </div>

    <div class="form-card mb-4">

        <form th:action="@{/attendance/records}" method="get" class="row g-3">

            <input type="hidden" name="page" value="0">

            <div class="col-md-3">
                <label class="form-label">Search</label>
                <input type="text"
                       name="keyword"
                       class="form-control"
                       placeholder="Student, code, batch, subject"
                       th:value="${keyword}">
            </div>

            <div class="col-md-3">
                <label class="form-label">Batch</label>
                <select name="batchId" class="form-select">
                    <option value="">All Batches</option>
                    <option th:each="batch : ${batches}"
                            th:value="${batch.id}"
                            th:text="${batch.batchName}"
                            th:selected="${selectedBatchId != null and selectedBatchId == batch.id}">
                    </option>
                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label">From Date</label>
                <input type="date"
                       name="fromDate"
                       class="form-control"
                       th:value="${selectedFromDate}">
            </div>

            <div class="col-md-2">
                <label class="form-label">To Date</label>
                <input type="date"
                       name="toDate"
                       class="form-control"
                       th:value="${selectedToDate}">
            </div>

            <div class="col-md-2">
                <label class="form-label">Status</label>
                <select name="status" class="form-select">
                    <option value="">All Status</option>
                    <option th:each="status : ${statuses}"
                            th:value="${status}"
                            th:text="${status}"
                            th:selected="${selectedStatus == status.name()}">
                    </option>
                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label">Page Size</label>
                <select name="size" class="form-select">
                    <option value="5" th:selected="${pageSize == 5}">5</option>
                    <option value="10" th:selected="${pageSize == 10}">10</option>
                    <option value="20" th:selected="${pageSize == 20}">20</option>
                    <option value="50" th:selected="${pageSize == 50}">50</option>
                </select>
            </div>

            <div class="col-md-10 d-flex align-items-end">
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">Search</button>
                    <a href="/attendance/records" class="btn btn-secondary">Reset</a>
                </div>
            </div>

        </form>

    </div>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>Date</th>
            <th>Student Code</th>
            <th>Student Name</th>
            <th>Batch</th>
            <th>Subject</th>
            <th>Status</th>
            <th>Marked At</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="record : ${records}">
            <td th:text="${record.attendanceDate}"></td>
            <td th:text="${record.enrollment.student.studentCode}"></td>
            <td th:text="${record.enrollment.student.fullName}"></td>
            <td th:text="${record.enrollment.batch.batchName}"></td>
            <td th:text="${record.enrollment.batch.subject}"></td>
            <td th:text="${record.status}"></td>
            <td th:text="${record.markedAt}"></td>
        </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(records)}" class="alert alert-warning">
        No attendance records found.
    </div>

    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/attendance/records(
                        page=${currentPage - 1},
                        size=${pageSize},
                        keyword=${keyword},
                        batchId=${selectedBatchId},
                        fromDate=${selectedFromDate},
                        toDate=${selectedToDate},
                        status=${selectedStatus}
                   )}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">

                <a class="page-link"
                   th:href="@{/attendance/records(
                        page=${i},
                        size=${pageSize},
                        keyword=${keyword},
                        batchId=${selectedBatchId},
                        fromDate=${selectedFromDate},
                        toDate=${selectedToDate},
                        status=${selectedStatus}
                   )}"
                   th:text="${i + 1}">
                </a>
            </li>

            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/attendance/records(
                        page=${currentPage + 1},
                        size=${pageSize},
                        keyword=${keyword},
                        batchId=${selectedBatchId},
                        fromDate=${selectedFromDate},
                        toDate=${selectedToDate},
                        status=${selectedStatus}
                   )}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

    <div class="text-center text-muted mt-2" th:if="${totalItems > 0}">
        Showing page
        <span th:text="${currentPage + 1}"></span>
        of
        <span th:text="${totalPages}"></span>
        |
        Total records:
        <span th:text="${totalItems}"></span>
    </div>

</div>

</body>
</html>
