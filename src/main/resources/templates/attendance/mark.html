<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Students')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">

    <h2>Mark Attendance</h2>

    <div class="alert alert-info">
        <strong>Batch:</strong> <span th:text="${batch.batchName}"></span><br>
        <strong>Date:</strong> <span th:text="${selectedDate}"></span>
    </div>

    <form th:action="@{/attendance/save}" method="post">

        <input type="hidden" name="batchId" th:value="${batchId}">
        <input type="hidden" name="attendanceDate" th:value="${selectedDate}">

        <table class="table table-bordered table-striped">
            <thead>
            <tr>
                <th>Student Code</th>
                <th>Student Name</th>
                <th>Present</th>
                <th>Absent</th>
                <th>Late</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="enrollment : ${enrollments}">
                <td th:text="${enrollment.student.studentCode}"></td>
                <td th:text="${enrollment.student.fullName}"></td>

                <input type="hidden" name="enrollmentIds" th:value="${enrollment.id}">

                <td>
                    <input type="radio"
                           th:name="${'status_' + enrollment.id}"
                           value="PRESENT"
                           checked>
                </td>

                <td>
                    <input type="radio"
                           th:name="${'status_' + enrollment.id}"
                           value="ABSENT">
                </td>

                <td>
                    <input type="radio"
                           th:name="${'status_' + enrollment.id}"
                           value="LATE">
                </td>
            </tr>
            </tbody>
        </table>

        <div th:if="${#lists.isEmpty(enrollments)}" class="alert alert-warning">
            No active students enrolled in this batch.
        </div>

        <button type="submit" class="btn btn-success" th:if="${!#lists.isEmpty(enrollments)}">
            Save Attendance
        </button>

        <a href="/attendance" class="btn btn-secondary">Back</a>

    </form>

</div>

</body>
</html>
