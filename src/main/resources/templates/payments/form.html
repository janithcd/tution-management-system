<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Students')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>Add Monthly Payment</h2>

    <form th:action="@{/payments/save}" method="post">

        <div class="mb-3">
            <label class="form-label">Select Student Enrollment</label>
            <select name="enrollmentId" class="form-select" required>
                <option value="">Select Enrollment</option>
                <option th:each="enrollment : ${enrollments}"
                        th:value="${enrollment.id}"
                        th:text="${enrollment.student.studentCode + ' - ' + enrollment.student.fullName + ' | ' + enrollment.batch.batchName + ' | Rs. ' + enrollment.batch.monthlyFee}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Payment Month</label>
            <select name="paymentMonth" class="form-select" required>
                <option th:each="month : ${#numbers.sequence(1,12)}"
                        th:value="${month}"
                        th:text="${month}"
                        th:selected="${month == currentMonth}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Payment Year</label>
            <input type="number" name="paymentYear" class="form-control" th:value="${currentYear}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Paid Amount</label>
            <input type="number" name="paidAmount" class="form-control" min="0" step="0.01" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Payment Method</label>
            <select name="paymentMethod" class="form-select" required>
                <option th:each="method : ${methods}"
                        th:value="${method}"
                        th:text="${method}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Remarks</label>
            <textarea name="remarks" class="form-control"></textarea>
        </div>

        <button type="submit" class="btn btn-success">Save Payment</button>
        <a href="/payments" class="btn btn-secondary">Cancel</a>

    </form>

</div>

</body>
</html>
