<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Students')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h2>Payment Management</h2>
        <div>
            <a href="/payments/new" class="btn btn-primary">Add Payment</a>
            <a href="/payments/dues" class="btn btn-warning">Payment Dues</a>
        </div>
    </div>

    <form th:action="@{/payments}" method="get" class="row g-3 mb-4">
        <div class="col-md-2">
            <label class="form-label">Page Size</label>
            <select name="size" class="form-select">
                <option value="5" th:selected="${pageSize == 5}">5</option>
                <option value="10" th:selected="${pageSize == 10}">10</option>
                <option value="20" th:selected="${pageSize == 20}">20</option>
                <option value="50" th:selected="${pageSize == 50}">50</option>
            </select>
        </div>

        <input type="hidden" name="page" value="0">

        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-primary">Apply</button>
        </div>
    </form>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>Student Code</th>
            <th>Student Name</th>
            <th>Batch</th>
            <th>Month</th>
            <th>Year</th>
            <th>Expected</th>
            <th>Paid</th>
            <th>Balance</th>
            <th>Status</th>
            <th>Method</th>
            <th>Payment Date</th>
            <th>Receipt</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="payment : ${payments}">
            <td th:text="${payment.enrollment.student.studentCode}"></td>
            <td th:text="${payment.enrollment.student.fullName}"></td>
            <td th:text="${payment.enrollment.batch.batchName}"></td>
            <td th:text="${payment.paymentMonth}"></td>
            <td th:text="${payment.paymentYear}"></td>
            <td th:text="${payment.expectedAmount}"></td>
            <td th:text="${payment.paidAmount}"></td>
            <td th:text="${payment.balanceAmount}"></td>
            <td th:text="${payment.status}"></td>
            <td th:text="${payment.paymentMethod}"></td>
            <td th:text="${payment.paymentDate}"></td>
            <td>
                <a th:href="@{/payments/receipt/{id}(id=${payment.id})}"
                   class="btn btn-sm btn-outline-primary"
                   target="_blank">
                    Receipt
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/payments(page=${currentPage - 1}, size=${pageSize})}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">

                <a class="page-link"
                   th:href="@{/payments(page=${i}, size=${pageSize})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/payments(page=${currentPage + 1}, size=${pageSize})}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

    <div class="text-center text-muted mt-2" th:if="${totalItems > 0}">
        Showing page
        <span th:text="${currentPage + 1}"></span>
        of
        <span th:text="${totalPages}"></span>
        |
        Total payments:
        <span th:text="${totalItems}"></span>
    </div>

    <div th:if="${#lists.isEmpty(payments)}" class="alert alert-warning">
        No payments recorded yet.
    </div>

    <a href="/students" class="btn btn-secondary">Students</a>
    <a href="/batches" class="btn btn-secondary">Batches</a>
    <a href="/enrollments" class="btn btn-secondary">Enrollments</a>
    <a href="/attendance" class="btn btn-secondary">Attendance</a>

</div>

</body>
</html>
