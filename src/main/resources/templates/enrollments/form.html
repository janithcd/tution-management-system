<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Students')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <h2>Enroll Student to Batch</h2>

    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <form th:action="@{/enrollments/save}" method="post">

        <div class="mb-3">
            <label class="form-label">Select Student</label>
            <select name="studentId" class="form-select" required>
                <option value="">Select Student</option>
                <option th:each="student : ${students}"
                        th:value="${student.id}"
                        th:text="${student.studentCode + ' - ' + student.fullName + ' - ' + student.educationLevel + ' ' + student.grade}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Select Batch</label>
            <select name="batchId" class="form-select" required>
                <option value="">Select Batch</option>
                <option th:each="batch : ${batches}"
                        th:value="${batch.id}"
                        th:text="${batch.batchName + ' - ' + batch.subject + ' - Rs. ' + batch.monthlyFee}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">Enroll Student</button>
        <a href="/enrollments" class="btn btn-secondary">Cancel</a>

    </form>

</div>

</body>
</html>
