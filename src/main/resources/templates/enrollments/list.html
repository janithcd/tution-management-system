<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Students')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container mt-4">

    <form th:action="@{/enrollments}" method="get" class="row g-3 mb-4">
        <div class="col-md-2">
            <label class="form-label">Page Size</label>
            <select name="size" class="form-select">
                <option value="5" th:selected="${pageSize == 5}">5</option>
                <option value="10" th:selected="${pageSize == 10}">10</option>
                <option value="20" th:selected="${pageSize == 20}">20</option>
                <option value="50" th:selected="${pageSize == 50}">50</option>
            </select>
        </div>

        <input type="hidden" name="page" value="0">

        <div class="col-md-2 d-flex align-items-end">
            <button type="submit" class="btn btn-primary">Apply</button>
        </div>
    </form>
    <div class="d-flex justify-content-between mb-3">
        <h2>Student Enrollments</h2>
        <a href="/enrollments/new" class="btn btn-primary">Enroll Student</a>
    </div>

    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>Student Code</th>
            <th>Student Name</th>
            <th>Batch</th>
            <th>Level</th>
            <th>Grade</th>
            <th>Stream</th>
            <th>Subject</th>
            <th>Enrolled Date</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="enrollment : ${enrollments}">
            <td th:text="${enrollment.student.studentCode}"></td>
            <td th:text="${enrollment.student.fullName}"></td>
            <td th:text="${enrollment.batch.batchName}"></td>
            <td th:text="${enrollment.batch.educationLevel}"></td>
            <td th:text="${enrollment.batch.grade}"></td>
            <td th:text="${enrollment.batch.stream}"></td>
            <td th:text="${enrollment.batch.subject}"></td>
            <td th:text="${enrollment.enrolledDate}"></td>
            <td th:text="${enrollment.status}"></td>
            <td>
                <a th:if="${enrollment.status.name() == 'ACTIVE'}"
                   th:href="@{/enrollments/deactivate/{id}(id=${enrollment.id})}"
                   class="btn btn-sm btn-warning">
                    Deactivate
                </a>

                <a th:if="${enrollment.status.name() == 'INACTIVE'}"
                   th:href="@{/enrollments/activate/{id}(id=${enrollment.id})}"
                   class="btn btn-sm btn-success">
                    Activate
                </a>

                <a th:href="@{/enrollments/delete/{id}(id=${enrollment.id})}"
                   class="btn btn-sm btn-danger"
                   onclick="return confirm('Are you sure?')">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>
    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">

            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/enrollments(page=${currentPage - 1}, size=${pageSize})}">
                    Previous
                </a>
            </li>

            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">

                <a class="page-link"
                   th:href="@{/enrollments(page=${i}, size=${pageSize})}"
                   th:text="${i + 1}">
                </a>
            </li>

            <li class="page-item" th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/enrollments(page=${currentPage + 1}, size=${pageSize})}">
                    Next
                </a>
            </li>

        </ul>
    </nav>

    <div class="text-center text-muted mt-2" th:if="${totalItems > 0}">
        Showing page
        <span th:text="${currentPage + 1}"></span>
        of
        <span th:text="${totalPages}"></span>
        |
        Total enrollments:
        <span th:text="${totalItems}"></span>
    </div>

    <a href="/students" class="btn btn-secondary">Students</a>
    <a href="/batches" class="btn btn-secondary">Batches</a>

</div>

</body>
</html>
