<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Student Form')}"></head>

<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container page-shell">

    <!-- Hero -->
    <div class="page-hero">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
                <h2 class="page-title"
                    th:text="${student.id == null ? 'Add New Student' : 'Edit Student'}">
                    Student Form
                </h2>
                <p class="page-subtitle">
                    Add or update student personal, academic, and contact information.
                </p>
            </div>

            <a href="/students" class="btn btn-soft">
                <i class="bi bi-arrow-left"></i>
                Back to Students
            </a>
        </div>
    </div>

    <!-- Form Card -->
    <div class="form-card">

        <form th:action="@{/students/save}" th:object="${student}" method="post" class="row g-4">

            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{studentCode}">

            <!-- Personal Details -->
            <div class="col-12">
                <h5 class="section-title">
                    <i class="bi bi-person-badge me-2"></i>
                    Personal Details
                </h5>
            </div>

            <div class="col-lg-6 col-md-12">
                <label class="form-label">Full Name</label>
                <input type="text"
                       th:field="*{fullName}"
                       class="form-control"
                       placeholder="Enter student's full name"
                       required>
            </div>

            <div class="col-lg-3 col-md-6">
                <label class="form-label">Phone Number</label>
                <input type="text"
                       th:field="*{phone}"
                       class="form-control"
                       placeholder="Student phone"
                       required>
            </div>

            <div class="col-lg-3 col-md-6">
                <label class="form-label">Parent Phone</label>
                <input type="text"
                       th:field="*{parentPhone}"
                       class="form-control"
                       placeholder="Parent phone"
                       required>
            </div>

            <div class="col-lg-6 col-md-12">
                <label class="form-label">School</label>
                <input type="text"
                       th:field="*{school}"
                       class="form-control"
                       placeholder="Enter school name">
            </div>

            <div class="col-lg-6 col-md-12">
                <label class="form-label">Address</label>
                <input type="text"
                       th:field="*{address}"
                       class="form-control"
                       placeholder="Enter address">
            </div>

            <!-- Academic Details -->
            <div class="col-12 mt-4">
                <h5 class="section-title">
                    <i class="bi bi-mortarboard me-2"></i>
                    Academic Details
                </h5>
            </div>

            <div class="col-lg-3 col-md-6">
                <label class="form-label">Education Level</label>
                <select th:field="*{educationLevel}" class="form-select" required>
                    <option value="">Select Level</option>
                    <option th:each="level : ${educationLevels}"
                            th:value="${level}"
                            th:text="${level}">
                    </option>
                </select>
            </div>

            <div class="col-lg-3 col-md-6">
                <label class="form-label">Grade</label>
                <select th:field="*{grade}" class="form-select" required>
                    <option value="">Select Grade</option>
                    <option th:each="grade : ${grades}"
                            th:value="${grade}"
                            th:text="${grade}">
                    </option>
                </select>
            </div>

            <div class="col-lg-3 col-md-6">
                <label class="form-label">Stream</label>
                <select th:field="*{stream}" class="form-select" required>
                    <option value="">Select Stream</option>
                    <option th:each="stream : ${streams}"
                            th:value="${stream}"
                            th:text="${stream}">
                    </option>
                </select>
                <div class="small-muted mt-1">
                    Use NONE for O/L students.
                </div>
            </div>

            <div class="col-lg-3 col-md-6">
                <label class="form-label">Joined Date</label>
                <input type="date"
                       th:field="*{joinedDate}"
                       class="form-control"
                       required>
            </div>

            <div class="col-lg-3 col-md-6">
                <label class="form-label">Status</label>
                <select th:field="*{status}" class="form-select" required>
                    <option value="">Select Status</option>
                    <option th:each="status : ${statuses}"
                            th:value="${status}"
                            th:text="${status}">
                    </option>
                </select>
            </div>

            <!-- Buttons -->
            <div class="col-12 mt-4">
                <div class="d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i>
                        Save Student
                    </button>

                    <a href="/students" class="btn btn-secondary">
                        <i class="bi bi-x-circle"></i>
                        Cancel
                    </a>
                </div>
            </div>

        </form>

    </div>

</div>

</body>
</html>
