<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">
    <h2>Student Form</h2>

    <form th:action="@{/students/save}" th:object="${student}" method="post">

        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" th:field="*{fullName}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Phone</label>
            <input type="text" th:field="*{phone}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Parent Phone</label>
            <input type="text" th:field="*{parentPhone}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">School</label>
            <input type="text" th:field="*{school}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Address</label>
            <textarea th:field="*{address}" class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Education Level</label>
            <select th:field="*{educationLevel}" class="form-select" required>
                <option value="">Select Level</option>
                <option th:each="level : ${educationLevels}"
                        th:value="${level}"
                        th:text="${level}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Grade</label>
            <select th:field="*{grade}" class="form-select" required>
                <option value="">Select Grade</option>
                <option th:each="grade : ${grades}"
                        th:value="${grade}"
                        th:text="${grade}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Stream</label>
            <select th:field="*{stream}" class="form-select">
                <option th:each="stream : ${streams}"
                        th:value="${stream}"
                        th:text="${stream}">
                </option>
            </select>
            <small class="text-muted">Use NONE for O/L students.</small>
        </div>

        <button type="submit" class="btn btn-success">Save Student</button>
        <a href="/students" class="btn btn-secondary">Cancel</a>

    </form>
</div>

</body>
</html>
